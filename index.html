<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Family Dinner Plan</title>

<style>
  :root {
    --cream: #FAF7F2;
    --warm-white: #FFFEF9;
    --brown: #3D2B1F;
    --brown-mid: #6B4C3B;
    --brown-light: #A07860;
    --terracotta: #C4633A;
    --terracotta-light: #E8886A;
    --sage: #7A9E7E;
    --sage-light: #A8C5AC;
    --gold: #C9923A;
    --gold-light: #E8C07A;
    --border: #E5DDD5;
    --text-muted: #8A7060;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--cream);
    color: var(--brown);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-weight: 300;
    line-height: 1.7;
    min-height: 100vh;
  }

  /* NAV */
  nav {
    position: sticky;
    top: 0;
    z-index: 100;
    background: var(--warm-white);
    border-bottom: 1px solid var(--border);
    padding: 0 1.5rem;
    display: flex;
    gap: 0;
    overflow-x: auto;
  }
  nav button {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: 13px;
    font-weight: 400;
    color: var(--text-muted);
    background: none;
    border: none;
    border-bottom: 2px solid transparent;
    padding: 1rem 1rem;
    cursor: pointer;
    white-space: nowrap;
    transition: color 0.2s, border-color 0.2s;
  }
  nav button.active {
    color: var(--terracotta);
    border-bottom-color: var(--terracotta);
    font-weight: 500;
  }
  nav button:hover { color: var(--brown); }

  /* SECTIONS */
  .section { display: none; }
  .section.active { display: block; }

  /* HEADER */
  .page-header {
    background: var(--brown);
    color: var(--cream);
    padding: 3rem 1.5rem 2.5rem;
    text-align: center;
  }
  .page-header .eyebrow {
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--gold-light);
    margin-bottom: 0.5rem;
  }
  .page-header h1 {
    font-family: Georgia, 'Times New Roman', serif;
    font-size: clamp(2rem, 5vw, 3rem);
    font-weight: 400;
    line-height: 1.2;
    margin-bottom: 0.5rem;
  }
  .page-header p {
    font-size: 14px;
    color: var(--gold-light);
    opacity: 0.8;
  }

  /* MEAL INDEX CARDS */
  .meals-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 1px;
    background: var(--border);
    margin: 0;
  }
  .meal-index-card {
    background: var(--warm-white);
    padding: 1.5rem;
    cursor: pointer;
    transition: background 0.15s;
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
  }
  .meal-index-card:hover { background: var(--cream); }
  .meal-index-card .card-type {
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    font-weight: 500;
  }
  .type-crock { color: var(--sage); }
  .type-quick { color: var(--terracotta); }
  .meal-index-card h3 {
    font-family: Georgia, 'Times New Roman', serif;
    font-size: 1.2rem;
    font-weight: 400;
    color: var(--brown);
  }
  .meal-index-card .card-meta {
    font-size: 12px;
    color: var(--text-muted);
    display: flex;
    gap: 1rem;
    flex-wrap: wrap;
  }
  .card-meta span { display: flex; align-items: center; gap: 4px; }
  .meal-index-card .view-recipe {
    margin-top: 0.5rem;
    font-size: 12px;
    font-weight: 500;
    color: var(--terracotta);
    text-decoration: none;
  }

  /* RECIPE DETAIL */
  .recipe-back {
    padding: 1rem 1.5rem;
    border-bottom: 1px solid var(--border);
    background: var(--warm-white);
  }
  .recipe-back button {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: 13px;
    color: var(--text-muted);
    background: none;
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .recipe-back button:hover { color: var(--brown); }

  .recipe-hero {
    background: var(--brown);
    color: var(--cream);
    padding: 2.5rem 1.5rem 2rem;
  }
  .recipe-hero .recipe-type {
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 0.5rem;
  }
  .recipe-hero h2 {
    font-family: Georgia, 'Times New Roman', serif;
    font-size: clamp(1.6rem, 4vw, 2.2rem);
    font-weight: 400;
    line-height: 1.2;
    margin-bottom: 1rem;
  }
  .recipe-stats {
    display: flex;
    gap: 1.5rem;
    flex-wrap: wrap;
  }
  .recipe-stats .stat { text-align: center; }
  .recipe-stats .stat-val {
    font-family: Georgia, 'Times New Roman', serif;
    font-size: 1.4rem;
    color: var(--gold-light);
    display: block;
  }
  .recipe-stats .stat-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    opacity: 0.7;
  }

  .recipe-body {
    max-width: 700px;
    margin: 0 auto;
    padding: 2rem 1.5rem;
  }

  .recipe-section-title {
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    font-weight: 500;
    color: var(--terracotta);
    margin-bottom: 1rem;
    padding-bottom: 0.5rem;
    border-bottom: 1px solid var(--border);
  }

  .ingredients-list {
    list-style: none;
    margin-bottom: 2rem;
  }
  .ingredients-list li {
    padding: 0.6rem 0;
    border-bottom: 1px solid var(--border);
    font-size: 15px;
    display: flex;
    gap: 1rem;
  }
  .ingredients-list li:last-child { border-bottom: none; }
  .ing-amount {
    font-weight: 500;
    color: var(--brown-mid);
    min-width: 80px;
  }

  .steps-list {
    list-style: none;
    margin-bottom: 2rem;
  }
  .steps-list li {
    display: flex;
    gap: 1rem;
    padding: 1rem 0;
    border-bottom: 1px solid var(--border);
    font-size: 15px;
    line-height: 1.6;
  }
  .steps-list li:last-child { border-bottom: none; }
  .step-num {
    font-family: Georgia, 'Times New Roman', serif;
    font-size: 1.5rem;
    color: var(--border);
    line-height: 1;
    min-width: 2rem;
  }

  .baby-tip {
    background: var(--sage-light);
    border-radius: 8px;
    padding: 1rem 1.25rem;
    margin-bottom: 2rem;
    font-size: 13px;
    color: var(--brown);
  }
  .baby-tip strong { font-weight: 500; color: var(--sage); }

  /* GROCERY LIST */
  .grocery-header {
    background: var(--brown);
    color: var(--cream);
    padding: 2.5rem 1.5rem 2rem;
    text-align: center;
  }
  .grocery-header h2 {
    font-family: Georgia, 'Times New Roman', serif;
    font-size: 2rem;
    font-weight: 400;
    margin-bottom: 0.5rem;
  }
  .grocery-header p { font-size: 13px; opacity: 0.7; margin-bottom: 1.5rem; }

  .grocery-controls {
    display: flex;
    gap: 10px;
    justify-content: center;
    flex-wrap: wrap;
  }
  .btn-clear {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: 13px;
    font-weight: 500;
    background: transparent;
    border: 1px solid rgba(255,255,255,0.3);
    color: var(--cream);
    padding: 8px 20px;
    border-radius: 100px;
    cursor: pointer;
    transition: background 0.2s, border-color 0.2s;
  }
  .btn-clear:hover { background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.5); }

  .progress-bar-wrap {
    background: rgba(255,255,255,0.15);
    border-radius: 100px;
    height: 4px;
    margin: 1.5rem 1.5rem 0;
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    background: var(--gold-light);
    border-radius: 100px;
    transition: width 0.4s ease;
  }

  .grocery-body { padding: 1.5rem; max-width: 700px; margin: 0 auto; }

  .grocery-cat { margin-bottom: 2rem; }
  .grocery-cat-title {
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    font-weight: 500;
    color: var(--terracotta);
    margin-bottom: 0.75rem;
    padding-bottom: 0.5rem;
    border-bottom: 1px solid var(--border);
  }

  .grocery-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 0.65rem 0;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: opacity 0.2s;
  }
  .grocery-item:last-child { border-bottom: none; }
  .grocery-item input[type="checkbox"] { display: none; }
  .check-box {
    width: 20px;
    height: 20px;
    border: 1.5px solid var(--border);
    border-radius: 4px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s, border-color 0.2s;
    background: var(--warm-white);
  }
  .check-box svg { display: none; }
  .grocery-item.checked .check-box {
    background: var(--sage);
    border-color: var(--sage);
  }
  .grocery-item.checked .check-box svg { display: block; }
  .grocery-item.checked .item-label {
    text-decoration: line-through;
    color: var(--text-muted);
    opacity: 0.6;
  }
  .item-label { font-size: 15px; }
  .progress-text {
    font-size: 12px;
    opacity: 0.6;
    text-align: center;
    margin-top: 0.25rem;
    color: var(--gold-light);
  }

  @media (max-width: 480px) {
    .recipe-stats { gap: 1rem; }
    .page-header { padding: 2rem 1rem 1.5rem; }
    .recipe-hero { padding: 1.5rem 1rem; }
    .recipe-body { padding: 1.5rem 1rem; }
    .grocery-body { padding: 1rem; }
  }
</style>
</head>
<body>

<div class="page-header">
  <div class="eyebrow">Dinner rotation</div>
  <h1>Family Meal Plan</h1>
  <p>7 meals · 4 adults + 1 toddler · High protein, affordable</p>
</div>

<nav id="main-nav">
  <button class="active" onclick="showSection('meals')">All Meals</button>
  <button onclick="showSection('grocery')">Grocery List</button>
</nav>

<!-- MEALS INDEX -->
<div id="section-meals" class="section active">
  <div class="meals-grid" id="meals-grid"></div>
</div>

<!-- RECIPE DETAIL -->
<div id="section-recipe" class="section">
  <div class="recipe-back"><button onclick="backToMeals()">← Back to meals</button></div>
  <div id="recipe-content"></div>
</div>

<!-- GROCERY LIST -->
<div id="section-grocery" class="section">
  <div class="grocery-header">
    <h2>Grocery List</h2>
    <p>Tap items to check them off as you shop</p>
    <div class="grocery-controls">
      <button class="btn-clear" onclick="clearChecks()">Clear all checks</button>
    </div>
    <div class="progress-bar-wrap">
      <div class="progress-bar-fill" id="progress-fill" style="width:0%"></div>
    </div>
    <p class="progress-text" id="progress-text">0 of 0 items</p>
  </div>
  <div class="grocery-body" id="grocery-body"></div>
</div>

<script>

  },
];

// Render meal index
function renderMeals() {
  const grid = document.getElementById('meals-grid');
  grid.innerHTML = meals.map(m => `
    <div class="meal-index-card" onclick="showRecipe('${m.id}')">
      <div class="card-type type-${m.type}">${m.typeLabel} · ${m.time}</div>
      <h3>${m.title}</h3>
      <p style="font-size:13px; color:var(--text-muted);">${m.description}</p>
      <div class="card-meta">
        <span>⬤ ${m.protein} protein</span>
        <span>⬤ ${m.cost}</span>
      </div>
      <div class="view-recipe">View recipe →</div>
    </div>
  `).join('');
}

// Render recipe detail
function showRecipe(id) {
  const m = meals.find(x => x.id === id);
  const html = `
    <div class="recipe-hero">
      <div class="recipe-type type-${m.type}" style="color:var(--gold-light); font-size:10px; letter-spacing:0.15em; text-transform:uppercase; margin-bottom:0.5rem;">${m.typeLabel}</div>
      <h2>${m.title}</h2>
      <div class="recipe-stats">
        <div class="stat"><span class="stat-val">${m.time}</span><span class="stat-label">Cook time</span></div>
        <div class="stat"><span class="stat-val">${m.protein}</span><span class="stat-label">Protein / serving</span></div>
        <div class="stat"><span class="stat-val">${m.cost}</span><span class="stat-label">Est. cost</span></div>
      </div>
    </div>
    <div class="recipe-body">
      <p style="color:var(--text-muted); font-size:14px; margin-bottom:1.5rem;">${m.serve}</p>
      <div class="baby-tip"><strong>For baby:</strong> ${m.baby}</div>
      <div class="recipe-section-title">Ingredients</div>
      <ul class="ingredients-list">
        ${m.ingredients.map(i => `<li><span class="ing-amount">${i.amount}</span><span>${i.item}</span></li>`).join('')}
      </ul>
      <div class="recipe-section-title">Instructions</div>
      <ol class="steps-list">
        ${m.steps.map((s, i) => `<li><span class="step-num">${i+1}</span><span>${s}</span></li>`).join('')}
      </ol>
    </div>
  `;
  document.getElementById('recipe-content').innerHTML = html;
  document.getElementById('section-meals').classList.remove('active');
  document.getElementById('section-recipe').classList.remove('active');
  document.getElementById('section-grocery').classList.remove('active');
  document.getElementById('section-recipe').classList.add('active');
  window.scrollTo(0, 0);
}

function backToMeals() {
  document.getElementById('section-recipe').classList.remove('active');
  document.getElementById('section-meals').classList.add('active');
  setNav('meals');
  window.scrollTo(0, 0);
}

// Render grocery list
let checked = {};

function renderGrocery() {
  const body = document.getElementById('grocery-body');
  body.innerHTML = grocery.map((cat, ci) => `
    <div class="grocery-cat">
      <div class="grocery-cat-title">${cat.cat}</div>
      ${cat.items.map((item, ii) => {
        const key = `${ci}-${ii}`;
        const isChecked = checked[key];
        return `
          <div class="grocery-item${isChecked ? ' checked' : ''}" onclick="toggleItem('${key}', this)">
            <div class="check-box">
              <svg width="12" height="10" viewBox="0 0 12 10" fill="none">
                <path d="M1 5L4.5 8.5L11 1" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </div>
            <span class="item-label">${item}</span>
          </div>`;
      }).join('')}
    </div>
  `).join('');
  updateProgress();
}

function toggleItem(key, el) {
  checked[key] = !checked[key];
  el.classList.toggle('checked', checked[key]);
  updateProgress();
}

function updateProgress() {
  const total = grocery.reduce((s, c) => s + c.items.length, 0);
  const done = Object.values(checked).filter(Boolean).length;
  const pct = total ? Math.round((done / total) * 100) : 0;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-text').textContent = `${done} of ${total} items`;
}

function clearChecks() {
  checked = {};
  document.querySelectorAll('.grocery-item').forEach(el => el.classList.remove('checked'));
  updateProgress();
}

// Nav
function showSection(name) {
  ['meals','recipe','grocery'].forEach(s => {
    document.getElementById('section-' + s).classList.remove('active');
  });
  if (name === 'recipe') {
    document.getElementById('section-recipe').classList.add('active');
  } else {
    document.getElementById('section-' + name).classList.add('active');
  }
  setNav(name);
  window.scrollTo(0, 0);
}

function setNav(name) {
  document.querySelectorAll('nav button').forEach((btn, i) => {
    btn.classList.remove('active');
  });
  const map = { meals: 0, grocery: 1 };
  if (map[name] !== undefined) {
    document.querySelectorAll('nav button')[map[name]].classList.add('active');
  }
}

renderMeals();
renderGrocery();
</script>
</body>
</html>
