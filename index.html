<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Family Dinner Plan</title>

<style>
  :root {
    --cream: #FAF7F2;
    --warm-white: #FFFEF9;
    --brown: #3D2B1F;
    --brown-mid: #6B4C3B;
    --brown-light: #A07860;
    --terracotta: #C4633A;
    --terracotta-light: #E8886A;
    --sage: #7A9E7E;
    --sage-light: #A8C5AC;
    --gold: #C9923A;
    --gold-light: #E8C07A;
    --border: #E5DDD5;
    --text-muted: #8A7060;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--cream);
    color: var(--brown);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-weight: 300;
    line-height: 1.7;
    min-height: 100vh;
  }

  /* NAV */
  nav {
    position: sticky;
    top: 0;
    z-index: 100;
    background: var(--warm-white);
    border-bottom: 1px solid var(--border);
    padding: 0 1.5rem;
    display: flex;
    gap: 0;
    overflow-x: auto;
  }
  nav button {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: 13px;
    font-weight: 400;
    color: var(--text-muted);
    background: none;
    border: none;
    border-bottom: 2px solid transparent;
    padding: 1rem 1rem;
    cursor: pointer;
    white-space: nowrap;
    transition: color 0.2s, border-color 0.2s;
  }
  nav button.active {
    color: var(--terracotta);
    border-bottom-color: var(--terracotta);
    font-weight: 500;
  }
  nav button:hover { color: var(--brown); }

  /* SECTIONS */
  .section { display: none; }
  .section.active { display: block; }

  /* HEADER */
  .page-header {
    background: var(--brown);
    color: var(--cream);
    padding: 3rem 1.5rem 2.5rem;
    text-align: center;
  }
  .page-header .eyebrow {
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--gold-light);
    margin-bottom: 0.5rem;
  }
  .page-header h1 {
    font-family: Georgia, 'Times New Roman', serif;
    font-size: clamp(2rem, 5vw, 3rem);
    font-weight: 400;
    line-height: 1.2;
    margin-bottom: 0.5rem;
  }
  .page-header p {
    font-size: 14px;
    color: var(--gold-light);
    opacity: 0.8;
  }

  /* MEAL INDEX CARDS */
  .meals-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 1px;
    background: var(--border);
    margin: 0;
  }
  .meal-index-card {
    background: var(--warm-white);
    padding: 1.5rem;
    cursor: pointer;
    transition: background 0.15s;
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
  }
  .meal-index-card:hover { background: var(--cream); }
  .meal-index-card .card-type {
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    font-weight: 500;
  }
  .type-crock { color: var(--sage); }
  .type-quick { color: var(--terracotta); }
  .meal-index-card h3 {
    font-family: Georgia, 'Times New Roman', serif;
    font-size: 1.2rem;
    font-weight: 400;
    color: var(--brown);
  }
  .meal-index-card .card-meta {
    font-size: 12px;
    color: var(--text-muted);
    display: flex;
    gap: 1rem;
    flex-wrap: wrap;
  }
  .card-meta span { display: flex; align-items: center; gap: 4px; }
  .meal-index-card .view-recipe {
    margin-top: 0.5rem;
    font-size: 12px;
    font-weight: 500;
    color: var(--terracotta);
    text-decoration: none;
  }

  /* RECIPE DETAIL */
  .recipe-back {
    padding: 1rem 1.5rem;
    border-bottom: 1px solid var(--border);
    background: var(--warm-white);
  }
  .recipe-back button {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: 13px;
    color: var(--text-muted);
    background: none;
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .recipe-back button:hover { color: var(--brown); }

  .recipe-hero {
    background: var(--brown);
    color: var(--cream);
    padding: 2.5rem 1.5rem 2rem;
  }
  .recipe-hero .recipe-type {
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 0.5rem;
  }
  .recipe-hero h2 {
    font-family: Georgia, 'Times New Roman', serif;
    font-size: clamp(1.6rem, 4vw, 2.2rem);
    font-weight: 400;
    line-height: 1.2;
    margin-bottom: 1rem;
  }
  .recipe-stats {
    display: flex;
    gap: 1.5rem;
    flex-wrap: wrap;
  }
  .recipe-stats .stat { text-align: center; }
  .recipe-stats .stat-val {
    font-family: Georgia, 'Times New Roman', serif;
    font-size: 1.4rem;
    color: var(--gold-light);
    display: block;
  }
  .recipe-stats .stat-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    opacity: 0.7;
  }

  .recipe-body {
    max-width: 700px;
    margin: 0 auto;
    padding: 2rem 1.5rem;
  }

  .recipe-section-title {
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    font-weight: 500;
    color: var(--terracotta);
    margin-bottom: 1rem;
    padding-bottom: 0.5rem;
    border-bottom: 1px solid var(--border);
  }

  .ingredients-list {
    list-style: none;
    margin-bottom: 2rem;
  }
  .ingredients-list li {
    padding: 0.6rem 0;
    border-bottom: 1px solid var(--border);
    font-size: 15px;
    display: flex;
    gap: 1rem;
  }
  .ingredients-list li:last-child { border-bottom: none; }
  .ing-amount {
    font-weight: 500;
    color: var(--brown-mid);
    min-width: 80px;
  }

  .steps-list {
    list-style: none;
    margin-bottom: 2rem;
  }
  .steps-list li {
    display: flex;
    gap: 1rem;
    padding: 1rem 0;
    border-bottom: 1px solid var(--border);
    font-size: 15px;
    line-height: 1.6;
  }
  .steps-list li:last-child { border-bottom: none; }
  .step-num {
    font-family: Georgia, 'Times New Roman', serif;
    font-size: 1.5rem;
    color: var(--border);
    line-height: 1;
    min-width: 2rem;
  }

  .baby-tip {
    background: var(--sage-light);
    border-radius: 8px;
    padding: 1rem 1.25rem;
    margin-bottom: 2rem;
    font-size: 13px;
    color: var(--brown);
  }
  .baby-tip strong { font-weight: 500; color: var(--sage); }

  /* GROCERY LIST */
  .grocery-header {
    background: var(--brown);
    color: var(--cream);
    padding: 2.5rem 1.5rem 2rem;
    text-align: center;
  }
  .grocery-header h2 {
    font-family: Georgia, 'Times New Roman', serif;
    font-size: 2rem;
    font-weight: 400;
    margin-bottom: 0.5rem;
  }
  .grocery-header p { font-size: 13px; opacity: 0.7; margin-bottom: 1.5rem; }

  .grocery-controls {
    display: flex;
    gap: 10px;
    justify-content: center;
    flex-wrap: wrap;
  }
  .btn-clear {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: 13px;
    font-weight: 500;
    background: transparent;
    border: 1px solid rgba(255,255,255,0.3);
    color: var(--cream);
    padding: 8px 20px;
    border-radius: 100px;
    cursor: pointer;
    transition: background 0.2s, border-color 0.2s;
  }
  .btn-clear:hover { background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.5); }

  .progress-bar-wrap {
    background: rgba(255,255,255,0.15);
    border-radius: 100px;
    height: 4px;
    margin: 1.5rem 1.5rem 0;
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    background: var(--gold-light);
    border-radius: 100px;
    transition: width 0.4s ease;
  }

  .grocery-body { padding: 1.5rem; max-width: 700px; margin: 0 auto; }

  .grocery-cat { margin-bottom: 2rem; }
  .grocery-cat-title {
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    font-weight: 500;
    color: var(--terracotta);
    margin-bottom: 0.75rem;
    padding-bottom: 0.5rem;
    border-bottom: 1px solid var(--border);
  }

  .grocery-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 0.65rem 0;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: opacity 0.2s;
  }
  .grocery-item:last-child { border-bottom: none; }
  .grocery-item input[type="checkbox"] { display: none; }
  .check-box {
    width: 20px;
    height: 20px;
    border: 1.5px solid var(--border);
    border-radius: 4px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s, border-color 0.2s;
    background: var(--warm-white);
  }
  .check-box svg { display: none; }
  .grocery-item.checked .check-box {
    background: var(--sage);
    border-color: var(--sage);
  }
  .grocery-item.checked .check-box svg { display: block; }
  .grocery-item.checked .item-label {
    text-decoration: line-through;
    color: var(--text-muted);
    opacity: 0.6;
  }
  .item-label { font-size: 15px; }
  .progress-text {
    font-size: 12px;
    opacity: 0.6;
    text-align: center;
    margin-top: 0.25rem;
    color: var(--gold-light);
  }

  .meal-checkbox {
    width: 24px;
    height: 24px;
    border: 1.5px solid var(--border);
    border-radius: 6px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    background: var(--warm-white);
    transition: background 0.2s, border-color 0.2s;
  }
  .meal-cb-checked {
    background: var(--sage);
    border-color: var(--sage);
  }
  .meal-selected {
    background: #F2F8F2 !important;
    border-left: 3px solid var(--sage);
  }
  .selection-banner {
    background: var(--warm-white);
    border-bottom: 1px solid var(--border);
    padding: 0.75rem 1.5rem;
    font-size: 13px;
    color: var(--text-muted);
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 8px;
  }
  .selection-banner-btns { display: flex; gap: 8px; }
  .btn-sm {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: 11px;
    font-weight: 500;
    padding: 4px 12px;
    border-radius: 100px;
    cursor: pointer;
    border: 1px solid var(--border);
    background: var(--warm-white);
    color: var(--text-muted);
  }
  .btn-sm:hover { background: var(--cream); color: var(--brown); }
    .recipe-stats { gap: 1rem; }
    .page-header { padding: 2rem 1rem 1.5rem; }
    .recipe-hero { padding: 1.5rem 1rem; }
    .recipe-body { padding: 1.5rem 1rem; }
    .grocery-body { padding: 1rem; }
  }
</style>
</head>
<body>

<div class="page-header">
  <div class="eyebrow">Dinner rotation</div>
  <h1>Family Meal Plan</h1>
  <p>7 meals · 4 adults + 1 toddler · High protein, affordable</p>
</div>

<nav id="main-nav">
  <button class="active" onclick="showSection('meals')">All Meals</button>
  <button onclick="showSection('grocery')">Grocery List</button>
</nav>

<!-- MEALS INDEX -->
<div id="section-meals" class="section active">
  <div class="selection-banner">
    <span id="selection-banner">Select meals below to build your grocery list</span>
    <div class="selection-banner-btns">
      <button class="btn-sm" onclick="selectAll()">Select all</button>
      <button class="btn-sm" onclick="selectNone()">Clear</button>
    </div>
  </div>
  <div class="meals-grid" id="meals-grid"></div>
</div>

<!-- RECIPE DETAIL -->
<div id="section-recipe" class="section">
  <div class="recipe-back"><button onclick="backToMeals()">← Back to meals</button></div>
  <div id="recipe-content"></div>
</div>

<!-- GROCERY LIST -->
<div id="section-grocery" class="section">
  <div class="grocery-header">
    <h2>Grocery List</h2>
    <p>Tap items to check them off as you shop</p>
    <div class="grocery-controls">
      <button class="btn-clear" onclick="clearChecks()">Clear all checks</button>
    </div>
    <div class="progress-bar-wrap">
      <div class="progress-bar-fill" id="progress-fill" style="width:0%"></div>
    </div>
    <p class="progress-text" id="progress-text">0 of 0 items</p>
  </div>
  <div class="grocery-body" id="grocery-body"></div>
</div>

<script>

  {
    id: 'tacos',

    ingredients: [
      { amount: '2½ lb', item: 'boneless chicken breasts' },
      { amount: '1 cup', item: 'salsa (jarred, any heat)' },

      { amount: '1 tsp', item: 'chili powder' },
      { amount: '1 tsp', item: 'cumin' },
      { amount: '½ tsp', item: 'garlic powder' },

      { amount: '½ tsp', item: 'salt' },

    ],

      'Place chicken breasts in the crock pot in a single layer.',
      'Mix together salsa, diced tomatoes, and all spices. Pour over chicken.',

      'Shred with two forks directly in the pot and stir to coat in juices.',

    cost: '~$12',

      { amount: '1 can', item: 'diced tomatoes' },
      { amount: '1 can', item: 'tomato paste (small, 6 oz)' },
      { amount: '1', item: 'yellow onion, diced' },
      { amount: '3 cloves', item: 'garlic, minced' },
      { amount: '1 cup', item: 'beef broth' },
      { amount: '2 tsp', item: 'chili powder' },
      { amount: '1 tsp', item: 'cumin' },
      { amount: '1 tsp', item: 'smoked paprika' },
      { amount: '½ tsp', item: 'salt' },

    steps: [
      'Brown ground beef in a skillet over medium-high heat, breaking it up. Drain fat.',
      'Add browned beef to crock pot along with all remaining ingredients. Stir well.',

      'Taste and adjust salt before serving.',
      'Serve over white rice or with cornbread. Top with shredded cheese and sour cream.',

  },
  {
    id: 'honeygarlicchicken',

      { amount: '⅓ cup', item: 'honey' },
      { amount: '¼ cup', item: 'low-sodium soy sauce' },

      { amount: '½ tsp', item: 'garlic powder' },
      { amount: 'to serve', item: 'cooked white rice, steamed broccoli' },
    ],
    steps: [
      'Whisk together honey, soy sauce, minced garlic, tomato paste, sesame oil, and garlic powder.',
      'Place chicken thighs in crock pot skin-side up. Pour sauce over the top.',
      'Cook on LOW 4–5 hours. Chicken is done when it reaches 165°F and pulls from the bone easily.',

      'Spoon the sauce from the crock pot over rice and serve with steamed broccoli.',
    ]
  },
  {
    id: 'beansoup',
    title: 'White Bean & Sausage Soup',
    type: 'crock',

    time: '6–8 hrs',

  },
  {
    id: 'potroast',

    type: 'crock',

    protein: '48g',
    cost: '~$14',

    description: 'The ultimate crock pot meal. Set it before work, dinner is done.',
    baby: 'Beef and veggies are very soft after 8 hours. Just shred the beef and serve.',

      { amount: '3–4 lb', item: 'chuck roast' },
      { amount: '1 lb', item: 'baby potatoes or russets, halved' },
      { amount: '3', item: 'large carrots, cut into chunks' },
      { amount: '1', item: 'yellow onion, quartered' },

      'Mix beef broth and Worcestershire sauce, pour around (not over) the roast.',

  },
  {
    id: 'sheetpan',
    title: 'Sheet Pan Sausage & Veggies',
    type: 'quick',
    typeLabel: 'Quick Oven',
    time: '25 min',
    protein: '35g',
    cost: '~$10',
    serve: 'Serve over rice',
    description: 'Fast, easy, minimal cleanup. Great when you forget the crock pot.',
    baby: 'Roasted veggies and sausage are soft and easy. Cut into small pieces.',
    ingredients: [
      { amount: '1 pkg (14 oz)', item: 'smoked sausage, sliced into coins' },
      { amount: '2', item: 'bell peppers, chopped' },

      { amount: '1', item: 'yellow onion, cut into wedges' },

  },
  {
    id: 'friedrice',
    title: 'Egg & Veggie Fried Rice',
    type: 'quick',
    typeLabel: 'Quick Stovetop',
    time: '20 min',
    protein: '28g',
    cost: '~$5',
    serve: 'Best with day-old leftover rice',

      { amount: '3', item: 'green onions, sliced' },
      { amount: '3 cloves', item: 'garlic, minced' },
      { amount: '3 tbsp', item: 'low-sodium soy sauce' },
      { amount: '1 tbsp', item: 'sesame oil' },

      'Add garlic and green onions, stir-fry 30 seconds until fragrant.',
      'Add frozen peas and corn, cook 2 minutes.',
      'Push everything to the side. Crack eggs into the empty space and scramble until just set, then mix into the veggies.',
      'Add rice to the pan, breaking up any clumps. Stir-fry for 3–4 minutes until heated through.',
      'Drizzle soy sauce and sesame oil over everything. Toss well. Taste and adjust seasoning.',
      'Serve immediately.',
    ]
  },
];

// Per-meal grocery items keyed by ingredient name (for deduplication)
const mealGrocery = {
  tacos: {
    'Proteins':        ['Boneless chicken breasts (2½ lb)'],
    'Canned & Dry':    ['Diced tomatoes, canned (1 can)', 'White rice (if serving over rice)'],
    'Produce':         ['Avocado or guacamole'],
    'Pantry & Spices': ['Chili powder', 'Cumin', 'Garlic powder', 'Smoked paprika', 'Salt & pepper'],
    'Taco Extras':     ['Flour or corn tortillas', 'Shredded cheese', 'Sour cream', 'Salsa (jarred)'],
  },
  chili: {
    'Proteins':        ['Ground beef 80/20 (2 lb)'],
    'Canned & Dry':    ['Kidney beans, canned (2 cans)', 'Diced tomatoes, canned (1 can)', 'Tomato paste (6 oz can)', 'Low-sodium beef broth (32 oz)', 'White rice (if serving over rice)'],
    'Produce':         ['Yellow onion (1)', 'Garlic (3 cloves)'],
    'Pantry & Spices': ['Chili powder', 'Cumin', 'Smoked paprika', 'Salt & pepper'],
  },
  honeygarlicchicken: {
    'Proteins':        ['Bone-in chicken thighs (3 lb)'],
    'Canned & Dry':    ['Low-sodium soy sauce', 'Honey', 'Tomato paste (small amount)', 'White rice'],
    'Produce':         ['Garlic (4 cloves)', 'Broccoli (1 head or frozen bag)'],
    'Pantry & Spices': ['Sesame oil', 'Garlic powder', 'Salt & pepper'],
  },
  beansoup: {
    'Proteins':        ['Smoked sausage / kielbasa (1 pkg)'],
    'Canned & Dry':    ['White cannellini beans, canned (2 cans)', 'Low-sodium chicken broth (32 oz)'],
    'Produce':         ['Yellow onion (1)', 'Garlic (3 cloves)', 'Carrots (2)', 'Baby spinach or kale (1 bag)'],
    'Pantry & Spices': ['Italian seasoning', 'Red pepper flakes', 'Salt & pepper'],
    'Bread':           ['Crusty bread or dinner rolls'],
  },
  potroast: {
    'Proteins':        ['Chuck roast (3–4 lb)'],
    'Canned & Dry':    ['Low-sodium beef broth (32 oz)', 'Worcestershire sauce'],
    'Produce':         ['Russet or baby potatoes (1 lb)', 'Carrots (3 large)', 'Yellow onion (1)', 'Garlic (4 cloves)'],
    'Pantry & Spices': ['Garlic powder', 'Onion powder', 'Smoked paprika', 'Salt & pepper', 'Olive oil'],
  },
  sheetpan: {
    'Proteins':        ['Smoked sausage / kielbasa (1 pkg)'],
    'Canned & Dry':    ['White rice'],
    'Produce':         ['Bell peppers (2)', 'Zucchini (2)', 'Yellow onion (1)'],
    'Pantry & Spices': ['Olive oil', 'Garlic powder', 'Smoked paprika', 'Onion powder', 'Salt & pepper'],
  },
  friedrice: {
    'Proteins':        ['Eggs (1 dozen)'],
    'Canned & Dry':    ['White rice (4 cups cooked)', 'Low-sodium soy sauce', 'Frozen peas and corn (1 bag)'],
    'Produce':         ['Green onions / scallions (1 bunch)', 'Garlic (3 cloves)'],
    'Pantry & Spices': ['Sesame oil', 'Olive or vegetable oil', 'Salt & pepper'],
  },
};

// State
let selectedMeals = new Set();
let checked = {};

// Render meal index with selection checkboxes
function renderMeals() {
  const grid = document.getElementById('meals-grid');
  grid.innerHTML = meals.map(m => {
    const sel = selectedMeals.has(m.id);
    return `
    <div class="meal-index-card ${sel ? 'meal-selected' : ''}">
      <div style="display:flex; justify-content:space-between; align-items:flex-start;">
        <div class="card-type type-${m.type}">${m.typeLabel} · ${m.time}</div>
        <div class="meal-checkbox ${sel ? 'meal-cb-checked' : ''}" onclick="toggleMealSelect('${m.id}')" title="Add to this week">
          <svg width="12" height="10" viewBox="0 0 12 10" fill="none" style="display:${sel?'block':'none'}">
            <path d="M1 5L4.5 8.5L11 1" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
      </div>
      <h3 onclick="showRecipe('${m.id}')" style="cursor:pointer;">${m.title}</h3>
      <p style="font-size:13px; color:var(--text-muted);">${m.description}</p>
      <div class="card-meta">
        <span>⬤ ${m.protein} protein</span>
        <span>⬤ ${m.cost}</span>
      </div>
      <div style="display:flex; gap:12px; margin-top:0.5rem; align-items:center;">
        <span class="view-recipe" onclick="showRecipe('${m.id}')">View recipe →</span>
        <span onclick="toggleMealSelect('${m.id}')" style="font-size:12px; font-weight:500; color:${sel ? 'var(--sage)' : 'var(--text-muted)'}; cursor:pointer;">
          ${sel ? '✓ This week' : '+ This week'}
        </span>
      </div>
    </div>`;
  }).join('');
  updateSelectionBanner();
}

function toggleMealSelect(id) {
  if (selectedMeals.has(id)) {
    selectedMeals.delete(id);
  } else {
    selectedMeals.add(id);
  }
  renderMeals();
}

function updateSelectionBanner() {
  const count = selectedMeals.size;
  const el = document.getElementById('selection-banner');
  if (count === 0) {
    el.textContent = 'Select meals below to build your grocery list';
  } else {
    el.textContent = `${count} meal${count > 1 ? 's' : ''} selected — grocery list is ready`;
  }
}

function selectAll() {
  meals.forEach(m => selectedMeals.add(m.id));
  renderMeals();
}
function selectNone() {
  selectedMeals.clear();
  renderMeals();
}

// Render recipe detail
function showRecipe(id) {
  const m = meals.find(x => x.id === id);
  const html = `
    <div class="recipe-hero">
      <div class="recipe-type type-${m.type}" style="color:var(--gold-light); font-size:10px; letter-spacing:0.15em; text-transform:uppercase; margin-bottom:0.5rem;">${m.typeLabel}</div>
      <h2>${m.title}</h2>
      <div class="recipe-stats">
        <div class="stat"><span class="stat-val">${m.time}</span><span class="stat-label">Cook time</span></div>
        <div class="stat"><span class="stat-val">${m.protein}</span><span class="stat-label">Protein / serving</span></div>
        <div class="stat"><span class="stat-val">${m.cost}</span><span class="stat-label">Est. cost</span></div>
      </div>
    </div>
    <div class="recipe-body">
      <p style="color:var(--text-muted); font-size:14px; margin-bottom:1.5rem;">${m.serve}</p>
      <div class="baby-tip"><strong>For baby:</strong> ${m.baby}</div>
      <div class="recipe-section-title">Ingredients</div>
      <ul class="ingredients-list">
        ${m.ingredients.map(i => `<li><span class="ing-amount">${i.amount}</span><span>${i.item}</span></li>`).join('')}
      </ul>
      <div class="recipe-section-title">Instructions</div>
      <ol class="steps-list">
        ${m.steps.map((s, i) => `<li><span class="step-num">${i+1}</span><span>${s}</span></li>`).join('')}
      </ol>
    </div>
  `;
  document.getElementById('recipe-content').innerHTML = html;
  ['meals','recipe','grocery'].forEach(s => document.getElementById('section-'+s).classList.remove('active'));
  document.getElementById('section-recipe').classList.add('active');
  window.scrollTo(0, 0);
}

function backToMeals() {
  document.getElementById('section-recipe').classList.remove('active');
  document.getElementById('section-meals').classList.add('active');
  setNav('meals');
  window.scrollTo(0, 0);
}

// Build grocery list from selected meals
function buildGroceryFromSelections() {
  const catMap = {};
  selectedMeals.forEach(id => {
    const mealItems = mealGrocery[id];
    if (!mealItems) return;
    Object.entries(mealItems).forEach(([cat, items]) => {
      if (!catMap[cat]) catMap[cat] = new Set();
      items.forEach(item => catMap[cat].add(item));
    });
  });
  // Convert to array format
  return Object.entries(catMap).map(([cat, itemSet]) => ({
    cat,
    items: Array.from(itemSet)
  }));
}

// Render grocery list
function renderGrocery() {
  const body = document.getElementById('grocery-body');
  const grocery = buildGroceryFromSelections();

  if (selectedMeals.size === 0) {
    body.innerHTML = `
      <div style="text-align:center; padding:3rem 1rem; color:var(--text-muted);">
        <div style="font-size:2rem; margin-bottom:1rem;">🥦</div>
        <p style="font-size:15px; margin-bottom:0.5rem;">No meals selected yet.</p>
        <p style="font-size:13px;">Go to <strong>All Meals</strong> and tap <em>+ This week</em> on the meals you're making.</p>
      </div>`;
    updateProgress(grocery);
    return;
  }

  body.innerHTML = grocery.map((cat, ci) => `
    <div class="grocery-cat">
      <div class="grocery-cat-title">${cat.cat}</div>
      ${cat.items.map((item, ii) => {
        const key = `${ci}-${ii}`;
        const isChecked = checked[key];
        return `
          <div class="grocery-item${isChecked ? ' checked' : ''}" onclick="toggleItem('${key}', this)">
            <div class="check-box">
              <svg width="12" height="10" viewBox="0 0 12 10" fill="none">
                <path d="M1 5L4.5 8.5L11 1" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </div>
            <span class="item-label">${item}</span>
          </div>`;
      }).join('')}
    </div>
  `).join('');
  updateProgress(grocery);
}

function toggleItem(key, el) {
  checked[key] = !checked[key];
  el.classList.toggle('checked', checked[key]);
  const grocery = buildGroceryFromSelections();
  updateProgress(grocery);
}

function updateProgress(grocery) {
  if (!grocery) grocery = buildGroceryFromSelections();
  const total = grocery.reduce((s, c) => s + c.items.length, 0);
  const done = Object.values(checked).filter(Boolean).length;
  const pct = total ? Math.round((done / total) * 100) : 0;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-text').textContent = total ? `${done} of ${total} items` : '';
}

function clearChecks() {
  checked = {};
  document.querySelectorAll('.grocery-item').forEach(el => el.classList.remove('checked'));
  updateProgress();
}

// Nav
function showSection(name) {
  ['meals','recipe','grocery'].forEach(s => {
    document.getElementById('section-' + s).classList.remove('active');
  });
  if (name === 'grocery') renderGrocery();
  document.getElementById('section-' + (name === 'recipe' ? 'recipe' : name)).classList.add('active');
  setNav(name);
  window.scrollTo(0, 0);
}

function setNav(name) {
  document.querySelectorAll('nav button').forEach(btn => btn.classList.remove('active'));
  const map = { meals: 0, grocery: 1 };
  if (map[name] !== undefined) document.querySelectorAll('nav button')[map[name]].classList.add('active');
}

renderMeals();
renderGrocery();
</script>
</body>
</html>
